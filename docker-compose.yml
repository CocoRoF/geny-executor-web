services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8088
      # Allow requests from nginx container and Cloudflare-forwarded origins
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:58088}
    restart: unless-stopped
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service"
    labels:
      service: "geny-executor-backend"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "58088:58088"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service"
    labels:
      service: "geny-executor-nginx"

networks:
  internal:
    driver: bridge

volumes:
  nginx-logs:
