services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8088
      # Allow requests from nginx container and Cloudflare-forwarded origins
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:58088}
      # Memory backend (see backend/app/config.py). Defaults to
      # ephemeral — set MEMORY_PROVIDER=sql with MEMORY_DSN to persist
      # via SQLite (filesystem path) or Postgres (postgresql:// DSN).
      - MEMORY_PROVIDER=${MEMORY_PROVIDER:-ephemeral}
      - MEMORY_DSN=${MEMORY_DSN:-}
      - MEMORY_DIALECT=${MEMORY_DIALECT:-}
      - MEMORY_ROOT=${MEMORY_ROOT:-}
      - MEMORY_TIMEZONE=${MEMORY_TIMEZONE:-}
      - MEMORY_SCOPE=${MEMORY_SCOPE:-session}
    restart: unless-stopped
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service"
    labels:
      service: "geny-executor-backend"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "58088:58088"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service"
    labels:
      service: "geny-executor-nginx"

  # Optional Postgres for the `sql` memory backend. Uncomment and set
  # MEMORY_PROVIDER=sql, MEMORY_DSN=postgresql://geny:geny@postgres:5432/geny
  # in .env to enable. Keep commented by default so the base compose
  # profile remains zero-dependency.
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     - POSTGRES_USER=geny
  #     - POSTGRES_PASSWORD=geny
  #     - POSTGRES_DB=geny
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - internal
  #   restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  nginx-logs:
  # postgres-data:
