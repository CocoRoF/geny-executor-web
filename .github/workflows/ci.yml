name: CI — geny-executor-web

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - "nginx/**"
  pull_request:
    branches: [main]

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Backend ──────────────────────────────────────────

  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app/
      - run: ruff format --check app/

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "geny-executor @ git+https://github.com/CocoRoF/geny-executor.git@main"
          pip install -e ".[dev]"
      - name: Run E2E tests
        run: |
          PYTHONPATH=. pytest tests/ -v --tb=short

  backend-security:
    name: Backend security audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - name: Install geny-executor from source
        run: pip install "geny-executor @ git+https://github.com/CocoRoF/geny-executor.git@main"
      - run: pip install -e .
      - run: pip-audit

  # ── Frontend ─────────────────────────────────────────

  frontend-lint:
    name: Frontend lint & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm install --no-save eslint @eslint/js typescript-eslint
      - run: npx tsc --noEmit
      - run: npx eslint src/ --max-warnings 0

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
