# geny-executor-web — reverse proxy (port 58088)
# Cloudflare tunnel connects to this port.
# All TLS is handled by Cloudflare; no SSL config needed here.

log_format detailed
    '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    'rt=$request_time ut=$upstream_response_time '
    'cf_ip=$http_cf_connecting_ip';

server {
    listen 58088;
    server_name _;

    access_log /var/log/nginx/access.log detailed;
    error_log  /var/log/nginx/error.log  warn;

    # ── WebSocket (streaming pipeline execution) ─────────────────────────────
    location /ws/ {
        proxy_pass         http://backend:8088;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep WebSocket alive during long agent executions
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;
    }

    # ── REST API ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8088;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ── Health check (bypass to backend) ─────────────────────────────────────
    location = /health {
        proxy_pass         http://backend:8088;
        proxy_http_version 1.1;
        access_log         off;
    }

    # ── Frontend (React SPA static files) ────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-XSS-Protection       "1; mode=block";

    # ── Tune for large streaming responses ───────────────────────────────────
    client_max_body_size    10m;
    proxy_buffering         off;       # essential for SSE / streaming
    proxy_request_buffering off;
}
